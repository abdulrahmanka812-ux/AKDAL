<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بنك تمكين المركزي | المنصة الرقمية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1a365d; /* اللون الأساسي للهوية */
            --gold: #c5a059; /* لون التميز للهوية */
            --bg: #f8f9fc;
            --white: #ffffff;
            --text: #2d3748;
        }

        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; color: var(--text); }

        /* الهيدر */
        header { background: var(--white); padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo-area img { height: 70px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { cursor: pointer; font-weight: 700; color: var(--navy); padding: 10px; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        /* التخطيط */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الأيقونات التفاعلية */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card-btn { background: var(--white); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-btn:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .card-btn i { color: var(--gold); margin-bottom: 15px; }

        /* الجدول */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: var(--navy); color: white; padding: 15px; text-align: center; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; text-align: center; }
        tr:nth-child(even) { background: #f7fafc; }

        /* الأوسمة */
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-top: 50px; }
        .rank { background: var(--white); padding: 20px; border-radius: 15px; border-bottom: 5px solid var(--gold); width: 180px; text-align: center; }
    </style>
</head>
<body>

    <script>
        const studentData = [
            { name: "عبد الكريم سليمان الدويش", points: 3250 }, { name: "محمد فيصل الشهراني", points: 3175 },
            { name: "عبد الرحمن على العريني", points: 2850 }, { name: "يزيد وليد الحمدان", points: 2800 },
            { name: "عبد الملك هشام السعيد", points: 2800 }, { name: "تميم بدر الجبر", points: 2550 },
            { name: "عبد الله فيصل السويدي", points: 2500 }, { name: "عبد الله وائل العريني", points: 2500 },
            { name: "البراء عبد الله العيدان", points: 2300 }, { name: "عبدالله فهد الماجد", points: 2300 },
            { name: "زياد مازن الجريد", points: 2175 }, { name: "هشام العريني", points: 2150 },
            { name: "عمر المهيزع", points: 1900 }, { name: "سعد الاحمد", points: 1625 },
            { name: "عبد الرحمن هشام السعيد", points: 1450 }, { name: "يوسف عبد المجيد الجار الله", points: 1425 },
            { name: "سلمان عمر الوهيبي", points: 875 }, { name: "انس ياسر الصغير", points: 800 },
            { name: "سعود متعب الزميع", points: 650 }, { name: "يوسف عبد الله بالبيد", points: 575 },
            { name: "رواف على السحيباني", points: 450 }
        ].sort((a, b) => b.points - a.points);
    </script>

    <header>
        <div class="logo-area"><img src="تمكين (تحفيزي ).svg" alt="تمكين"></div>
        <div class="nav-links">
            <a onclick="showPage('home')">الرئيسية</a>
            <a onclick="showPage('students')">الطلاب</a>
            <a onclick="showPage('bourse')">البورصة</a>
            <a onclick="showPage('badges')">الأوسمة</a>
        </div>
    </header>

    <div class="container">
        <div id="home" class="page active">
            <h2 style="text-align: center;">مرحباً بك في مركز قيادة بنك تمكين</h2>
            <div class="grid">
                <div class="card-btn" onclick="showPage('students')"><i data-lucide="users" size="40"></i><h3>الطلاب</h3></div>
                <div class="card-btn" onclick="showPage('bourse')"><i data-lucide="trending-up" size="40"></i><h3>البورصة</h3></div>
                <div class="card-btn" onclick="showPage('badges')"><i data-lucide="award" size="40"></i><h3>الأوسمة</h3></div>
                <div class="card-btn" style="opacity: 0.6;"><i data-lucide="gift" size="40"></i><h3>الجوائز (قريباً)</h3></div>
                <div class="card-btn" style="opacity: 0.6;"><i data-lucide="zap" size="40"></i><h3>النشاط (قريباً)</h3></div>
            </div>
        </div>

        <div id="students" class="page">
            <h2>سجل المنتسبين (الترتيب العام)</h2>
            <table>
                <thead><tr><th>المركز</th><th>اسم الطالب</th><th>النقاط</th></tr></thead>
                <tbody id="full-table"></tbody>
            </table>
        </div>

        <div id="bourse" class="page">
            <h2>مؤشر البورصة الحي</h2>
            <div style="background:white; padding:20px; border-radius:20px;"><canvas id="bourseChart"></canvas></div>
        </div>

        <div id="badges" class="page">
            <h2>نخبة التميز</h2>
            <div class="podium" id="podium"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // تعبئة الجدول
        const tbody = document.getElementById('full-table');
        studentData.forEach((s, i) => {
            tbody.innerHTML += `<tr><td>${i+1}</td><td>${s.name}</td><td style="font-weight:bold; color:var(--navy)">${s.points}</td></tr>`;
        });

        // تعبئة الأوسمة
        const podium = document.getElementById('podium');
        studentData.slice(0, 3).forEach((s, i) => {
            podium.innerHTML += `<div class="rank">${i===0?'🥇':i===1?'🥈':'🥉'}<h4>${s.name}</h4><p>${s.points} نقطة</p></div>`;
        });

        // البورصة
        new Chart(document.getElementById('bourseChart'), {
            type: 'line',
            data: { 
                labels: studentData.map(s => s.name.split(' ')[0]), 
                datasets: [{ label: 'النقاط', data: studentData.map(s => s.points), borderColor: '#c5a059', backgroundColor: '#1a365d', fill: true }] 
            }
        });
    </script>
</body>
</html>
